      // ── UI COMPONENTS ────────────────────────────────────────────────────────
      function TextScramble({ children, duration = 0.8, speed = 0.04, characterSet, as: Tag = 'span', triggerOnView = false, style, ...props }) {
        const chars = characterSet || 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        const [displayText, setDisplayText] = useState(children);
        const isAnimating = useRef(false);
        const elRef = useRef(null);

        const scramble = () => {
          if (isAnimating.current) return;
          isAnimating.current = true;
          const steps = duration / speed;
          let step = 0;
          const id = setInterval(() => {
            const progress = step / steps;
            let out = '';
            for (let i = 0; i < children.length; i++) {
              if (children[i] === ' ') { out += ' '; continue; }
              out += progress * children.length > i
                ? children[i]
                : chars[Math.floor(Math.random() * chars.length)];
            }
            setDisplayText(out);
            step++;
            if (step > steps) {
              clearInterval(id);
              setDisplayText(children);
              isAnimating.current = false;
            }
          }, speed * 1000);
        };

        useEffect(() => {
          if (!triggerOnView) { scramble(); return; }
          const observer = new IntersectionObserver(
            ([entry]) => { if (entry.isIntersecting) { scramble(); observer.disconnect(); } },
            { threshold: 0.3 }
          );
          if (elRef.current) observer.observe(elRef.current);
          return () => observer.disconnect();
        }, []);

        return <Tag ref={elRef} style={style} {...props}>{displayText}</Tag>;
      }

      function ProgressiveBlur({ direction = 'bottom', blurLayers = 8, blurIntensity = 0.4, style }) {
        const ANGLES = { top: 0, right: 90, bottom: 180, left: 270 };
        const layers = Math.max(blurLayers, 2);
        const segmentSize = 1 / (blurLayers + 1);
        const angle = ANGLES[direction];
        return (
          <div style={{ position: 'absolute', inset: 0, borderRadius: 'inherit', pointerEvents: 'none', ...style }}>
            {Array.from({ length: layers }).map((_, i) => {
              const stops = [
                i * segmentSize, (i + 1) * segmentSize,
                (i + 2) * segmentSize, (i + 3) * segmentSize,
              ].map((pos, pi) => `rgba(255,255,255,${pi === 1 || pi === 2 ? 1 : 0}) ${pos * 100}%`);
              const gradient = `linear-gradient(${angle}deg, ${stops.join(', ')})`;
              return (
                <div key={i} style={{
                  position: 'absolute', inset: 0, borderRadius: 'inherit',
                  maskImage: gradient, WebkitMaskImage: gradient,
                  backdropFilter: `blur(${i * blurIntensity}px)`,
                }}/>
              );
            })}
          </div>
        );
      }

              </h2>
              <p
                style={{
                  color: "var(--text-sub)",
                  fontSize: 18,
                  lineHeight: 1.65,
                  marginBottom: 48,
                }}
              >
                {t.contact.sub}
              </p>

              {/* Email pill */}
              <a
                href={`mailto:${t.contact.email}`}
                style={{
                  display: "inline-flex",
                  alignItems: "center",
                  gap: 10,
                  padding: "16px 28px",
                  borderRadius: 16,
                  background: "var(--card)",
                  border: "1px solid var(--border)",
                  color: "var(--text)",
                  textDecoration: "none",
                  fontSize: 16,
                  fontWeight: 600,
                  marginBottom: 48,
                  transition: "all 0.2s",
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.borderColor = "var(--accent)";
                  e.currentTarget.style.boxShadow =
                    "0 0 24px oklch(72% 0.22 270 / 0.2)";
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.borderColor = "var(--border)";
                  e.currentTarget.style.boxShadow = "none";
                }}
              >
                <EmailIcon size={18} /> {t.contact.email}
              </a>

              {/* Social links row */}
              <div
                style={{
                  display: "flex",
                  gap: 16,
                  justifyContent: "center",
                  flexWrap: "wrap",
                }}
              >
                {t.contact.links.map((link) => {
                  const Icon =
                    link.icon === "gh"
                      ? GithubIcon
                      : link.icon === "li"
                        ? LinkedInIcon
                        : EmailIcon;
                  return (
                    <a
                      key={link.name}
                      href={link.url}
                      target="_blank"
                      rel="noopener noreferrer"
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: 10,
                        padding: "14px 24px",
                        borderRadius: 14,
                        background: "var(--card)",
                        border: "1px solid var(--border)",
                        color: "var(--text-sub)",
                        textDecoration: "none",
                        fontSize: 14,
                        fontWeight: 600,
                        transition: "all 0.2s",
                      }}
                      onMouseEnter={(e) => {
                        e.currentTarget.style.color = "var(--text)";
                        e.currentTarget.style.transform = "translateY(-3px)";
                        e.currentTarget.style.borderColor =
                          "var(--border-hover)";
                      }}
                      onMouseLeave={(e) => {
                        e.currentTarget.style.color = "var(--text-sub)";
                        e.currentTarget.style.transform = "none";
                        e.currentTarget.style.borderColor = "var(--border)";
                      }}
                    >
                      <Icon size={18} /> {link.name}
                    </a>
                  );
                })}
              </div>
            </div>
          </section>
        );
      }

      // ── FOOTER ───────────────────────────────────────────────────────────────
      function Footer({ lang }) {
        return (
          <footer
            style={{
              padding: "32px 40px",
              borderTop: "1px solid var(--border)",
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              color: "var(--text-dim)",
              fontSize: 13,
            }}
          >
            <span>© 2025 Eren Güneşer</span>
            <span style={{ fontFamily: "monospace", fontSize: 12 }}>
              {lang === "en"
                ? "Built with ♥ in Wrocław"
                : "Wrocław'dan ♥ ile yapıldı"}
            </span>
          </footer>
        );
      }

      // ── LABEL ─────────────────────────────────────────────────────────────────
      function Label({ text, center }) {
        return (
          <div
            style={{
              display: "inline-flex",
              alignItems: "center",
              gap: 10,
              ...(center ? { justifyContent: "center", width: "100%" } : {}),
            }}
          >
            <div
              style={{
                width: 6,
                height: 6,
                borderRadius: "50%",
                background: "var(--accent)",
              }}
            />
            <span
              style={{
                color: "var(--accent)",
                fontSize: 13,
                fontWeight: 700,
                letterSpacing: "1.5px",
                textTransform: "uppercase",
                fontFamily: "monospace",
              }}
            >
              {text}
            </span>
          </div>
        );
      }

      // ── SIMPLE TWEAKS PANEL ──────────────────────────────────────────────────
      function SimpleTweaksPanel({ accentHue, onAccentChange, onClose }) {
        const presets = [
          { label: "Purple", hue: 270 },
          { label: "Blue", hue: 220 },
          { label: "Cyan", hue: 190 },
          { label: "Green", hue: 140 },
          { label: "Orange", hue: 40 },
          { label: "Pink", hue: 330 },
        ];
        return (
          <div
            style={{
              position: "fixed",
              bottom: 24,
              right: 24,
              zIndex: 9999,
              background: "#1c1c26",
              border: "1px solid rgba(255,255,255,0.1)",
              borderRadius: 18,
              padding: 24,
              width: 260,
              boxShadow: "0 24px 64px rgba(0,0,0,0.6)",
              fontFamily: "var(--font)",
            }}
          >
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                marginBottom: 20,
              }}
            >
              <span style={{ fontWeight: 700, fontSize: 14, color: "#f0f0f5" }}>
                Tweaks
              </span>
              <button
                onClick={onClose}
                style={{
                  background: "none",
                  border: "none",
                  color: "#8888aa",
                  cursor: "pointer",
                  fontSize: 18,
                  lineHeight: 1,
                  padding: 4,
                }}
              >
                ×
              </button>
            </div>

            <div style={{ marginBottom: 16 }}>
              <p
                style={{
                  fontSize: 12,
                  color: "#8888aa",
                  marginBottom: 10,
                  fontWeight: 600,
                  textTransform: "uppercase",
                  letterSpacing: "0.8px",
                }}
              >
                Accent Color
              </p>
              <input
                type="range"
                min={0}
                max={360}
                step={1}
                value={accentHue}
                onChange={(e) => onAccentChange(Number(e.target.value))}
                style={{
                  width: "100%",
                  accentColor: `oklch(72% 0.22 ${accentHue})`,
                }}
              />
              <div
                style={{
                  display: "flex",
                  flexWrap: "wrap",
                  gap: 8,
                  marginTop: 12,
                }}
              >
                {presets.map((p) => (
                  <button
                    key={p.hue}
                    onClick={() => onAccentChange(p.hue)}
                    style={{
                      width: 28,
                      height: 28,
                      borderRadius: "50%",
                      border:
                        accentHue === p.hue
                          ? "2px solid white"
                          : "2px solid transparent",
                      background: `oklch(72% 0.22 ${p.hue})`,
                      cursor: "pointer",
                      transition: "transform 0.15s",
                    }}
                    title={p.label}
                    onMouseEnter={(e) =>
                      (e.currentTarget.style.transform = "scale(1.15)")
                    }
                    onMouseLeave={(e) =>
                      (e.currentTarget.style.transform = "scale(1)")
                    }
                  />
                ))}
              </div>
            </div>
          </div>
        );
      }

      // ── APP ──────────────────────────────────────────────────────────────────
      function App() {
        const [lang, setLang] = useState(TWEAK_DEFAULTS.lang || "en");
        const [accentHue, setAccentHue] = useState(TWEAK_DEFAULTS.accentHue);
        const t = copy[lang];

        const applyAccent = (hue) => {
          document.documentElement.style.setProperty(
            "--accent",
            `oklch(72% 0.22 ${hue})`,
          );
          document.documentElement.style.setProperty(
            "--accent2",
            `oklch(72% 0.22 ${(hue + 70) % 360})`,
          );
          document.documentElement.style.setProperty(
            "--accent3",
            `oklch(72% 0.22 ${(hue + 140) % 360})`,
          );
          document.documentElement.style.setProperty(
            "--accent-glow",
            `oklch(72% 0.22 ${hue} / 0.18)`,
          );
        };

        useEffect(() => {
          applyAccent(accentHue);
        }, []);

        // Tweaks panel wiring
        useEffect(() => {
          const handler = (e) => {
            if (e.data?.type === "__activate_edit_mode")
              setTweaksPanelVisible(true);
            if (e.data?.type === "__deactivate_edit_mode")
              setTweaksPanelVisible(false);
          };
          window.addEventListener("message", handler);
          window.parent.postMessage({ type: "__edit_mode_available" }, "*");
          return () => window.removeEventListener("message", handler);
        }, []);

        const [tweaksPanelVisible, setTweaksPanelVisible] = useState(false);

        const handleAccentChange = (v) => {
          setAccentHue(v);
          applyAccent(v);
          window.parent.postMessage(
            { type: "__edit_mode_set_keys", edits: { accentHue: v } },
            "*",
          );
        };

        return (
          <>
            <Nav t={t} lang={lang} setLang={setLang} />
            <Hero t={t} />
            <About t={t} />
            <Projects t={t} />
            <Skills t={t} />
            <FAQ t={t} />
            <Contact t={t} />
            <Footer lang={lang} />
            {tweaksPanelVisible && (
              <SimpleTweaksPanel
                accentHue={accentHue}
                onAccentChange={handleAccentChange}
                onClose={() => {
                  setTweaksPanelVisible(false);
                  window.parent.postMessage(
                    { type: "__edit_mode_dismissed" },
                    "*",
                  );
                }}
              />
            )}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
